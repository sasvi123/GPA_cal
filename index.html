<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UoP GPA Calculator - Smart CGPA</title>
    <style>
        :root { --primary: #901d68; --bg: #f8fafc; --text: #361d37; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 550px; }
        h2 { text-align: center; color: var(--primary); margin-top: 0; }
        .section-label { font-size: 0.75rem; font-weight: bold; color: #64748b; text-transform: uppercase; margin-bottom: 10px; display: block; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.85rem; }
        select, input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .fast-entry { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 1.5rem; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-add { background-color: var(--primary); color: white; }
        .btn-reset { background: #e2e8f0; }
        .course-item { display: flex; justify-content: space-between; background: #fff; padding: 10px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #e2e8f0; border-left: 4px solid var(--primary); font-size: 0.8rem; }
        .delete-btn { color: var(--danger); cursor: pointer; font-weight: bold; }
        .result-area { text-align: center; margin-top: 20px; padding: 15px; background: #eff6ff; border: 2px dashed var(--primary); border-radius: 12px; }
        #gpa-result { font-size: 2.2rem; font-weight: bold; color: var(--primary); margin: 5px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>GPA Calculator</h2>

    <span class="section-label">Past Standing (Up to Sem 2)</span>
    <div class="fast-entry">
        <div class="form-group">
            <label>Current CGPA</label>
            <input type="number" id="past-cgpa" step="0.01" placeholder="e.g. 3.50" oninput="calculateGPA()">
        </div>
        <div class="form-group">
            <label>Total Credits Earned</label>
            <input type="number" id="past-credits" placeholder="e.g. 30" oninput="calculateGPA()">
        </div>
    </div>

    <span class="section-label">Add New Courses (Sem 3 onwards or You can calculate GPA from sem 1)</span>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="form-group">
            <label>Semester</label>
            <select id="sem-select" onchange="updateDepartments()">
                <option value="Sem 1">Semester 1</option>
                <option value="Short Sem">Short Semester</option>
                <option value="Sem 2">Semester 2</option>
                <option value="Sem 3">Semester 3</option>
                
            </select>
        </div>
        <div class="form-group">
            <label>Department</label>
            <select id="dept-select" onchange="updateCourses()">
                <option value="">-- Select --</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>Course Name</label>
        <select id="course-select" onchange="autoFillCredits()">
            <option value="">-- Select Dept First --</option>
        </select>
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="form-group" style="flex: 1;">
            <label>Credits</label>
            <input type="number" id="credit-input" readonly>
        </div>
        <div class="form-group" style="flex: 1;">
            <label>Grade</label>
            <select id="grade-select">
                <option value="4.0">A/A+</option>
                <option value="3.7">A-</option>
                <option value="3.3">B+</option>
                <option value="3.0">B</option>
                <option value="2.7">B-</option>
                <option value="2.3">C+</option>
                <option value="2.0">C</option>
                <option value="0.0">E</option>
            </select>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-add" onclick="addCourse()">Add Subject</button>
        <button class="btn-reset" onclick="resetAll()">Reset All</button>
    </div>

    <div id="course-list" style="margin-top: 20px;"></div>

    <div class="result-area">
        <h3 style="margin:0; font-size: 0.9rem; color: #64748b;">NEW CUMULATIVE GPA</h3>
        <p id="gpa-result">0.00</p>
    </div>
    <div id="analytics-summary" style="margin-top: 20px; padding: 15px; border-radius: 8px; font-size: 0.9rem; line-height: 1.5; display: none;">
    </div>
</div>

<script>
    const universityData = {
        "Sem 1": {
            "General": [
                { name: "CE1010 - Engineering Mechanics", credits: 3 },
                { name: "CO1010 - Programming for Engineers I", credits: 3 },
                { name: "EE1010 - Electricity", credits: 3 },
                { name: "EF1010 - English for Communication I", credits: 3 },
                { name: "MA1100 - Ethics and Sustainability", credits: 2 },
                { name: "EM1010 - Calculus I", credits: 4 }

            ]

        },
        "Short Semester": {
            "General": [
                { name: "MA2300 - Management for Engineers", credits: 3 }
            ]
        },

        "Sem 2": {
            "Computer Engineering": [
                { name: "CO1020 - Computer Systems and Programming", credits: 5 },
                { name: "CO1030 - Data Structures and Algorithms I", credits: 2 },
                { name: "EE1810 - Electronics", credits: 3 },
                { name: "EM1030 - Differential Equations", credits: 2 },
                { name: "EM1050 - Discrete Mathematics", credits: 3 },
                { name: "EM1020 - Linear Algebra", credits: 3 }
            ],
            "Electrical and Electronics Engineering": [
                { name: "EM1020 - Linear Algebra", credits: 3 },
                { name: "EM1040 - Advanced Differential Equations", credits: 3 },
                { name: "EE1020 - Electronic Device Physics", credits: 3 },
                { name: "CE1120 - Fluid Mechanics and Thermodynamics", credits: 3 },
                { name: "CE1110 - Materials Science", credits: 3 },
                { name: "CO1810 - Programming for Engineers II", credits: 3 }
            ],
            "Mechanical Engineering": [
                { name: "EM1020 - Linear Algebra", credits: 3 },
                { name: "EM1030 - Differential Equations", credits: 2 },
                { name: "ME1010 - Fluid Mechanics and Thermodynamics", credits: 3 },
                { name: "CE1110 - Materials Science", credits: 3 },
                { name: "ME1020 - Engineering Drawing", credits: 2 },
                { name: "ME1010 - Fundamentals of Manufacturing", credits: 2 },
                { name: "CO1810 - Programming for Engineers II", credits: 3 }
            ],
            "Manufacturing Engineering": [
                { name: "EM1020 - Linear Algebra", credits: 3 },
                { name: "CO1810 - Programming for Engineers II", credits: 3 },
                { name: "CE1120 - Fluid Mechanics and Thermodynamics", credits: 3 },
                { name: "CE1110 - Materials Science", credits: 3 },
                { name: "ME1020 - Engineering Drawing", credits: 2 },
                { name: "MI1010 - Fundamentals of Manufacturing", credits: 2 },
                { name: "EM1030 - Differential Equations", credits: 2 }
            ],
            "Civil Engineering": [
                { name: "EM1020 - Linear Algebra", credits: 3 },
                { name: "CE1120 - Fluid Mechanics and Thermodynamics", credits: 3 },
                { name: "CE1110 - Materials Science", credits: 3 },
                { name: "ME1020 - Engineering Drawing", credits: 2 },
                { name: "MI1010 - Fundamentals of Manufacturing", credits: 2 },
                { name: "EM1030 - Differential Equations", credits: 2 },
                { name: "CE1130 - Mechanics of Materials", credits: 3 }
            ],
            "Chemical and Process Engineering": [
                {name: "CE1120 - Fluid Mechanics and Thermodynamics", credits: 3},
                {name: "EM1030 - Differential Equations", credits: 2},
                {name: "CP1020 - Design and Innovation", credits: 2},
                {name: "CP1030 - Material Science", credits: 3},
                {name: "EF1020 - English for Communication II", credits: 2},
                {name: "EM1020 - Linear Algebra", credits: 3},
                {name: "ME1020 - Engineering Drawing", credits: 2},
                {name: "MI1010 - Fundamentals of Manufacturing", credits: 2}
            ]


        },
        "Sem 3": {
            "Computer Engineering": [
                { name: "CO2020 - Computer Networking", credits: 3 },
                { name: "CO2030 - Data Structures and Algorithms II", credits: 3 },
                { name: "CO2040 - Software Design and Development", credits: 2 },
                { name: "EM2020 - Probability and Statistics", credits: 2 },
                { name: "EM2060 - Numerical Methods", credits: 3 },
                { name: "CO2010 - Digital Circuits Design", credits: 4 },
                { name: "CO2060 - Software Systems Design Project", credits: 2 }
            ],
            "Electrical and Electronics Engineering": [
                { name: "EE2010 - Circuit Analysis", credits: 3 },
                { name: "EE2020 - Signal and Systems", credits: 3 },
                { name: "EE2030 - Digital Logic Design", credits: 3 },
                { name: "EE2040 - Analog Electronics", credits: 3 },
                { name: "EE2050 - Design principles and Manufacturing T ", credits: 3 },
                { name: "EE3070 - Computational Methods", credits: 3 }
            ],
            "Mechanical Engineering": [
                { name: "EM2010 - Calculus II", credits: 2 },
                { name: "EM2020 - Probability and Statistics", credits: 2 },
                { name: "ME2010 - Engineering Innovation and Design", credits: 3 },
                { name: "ME2020 - Mechanics of Machines", credits: 3 },
                { name: "CE2080 - Mechanics of Materials", credits: 3 },
                { name: "CE2020 - Fluid Mechanics I", credits: 3 },
                { name: "EE2800 - Introduction to Electrical Engineering", credits: 3 }
            ],
            "Manufacturing Engineering": [
                { name: "MI2010 - Manufacturing Processes I", credits: 3 },
                { name: "ME2800 - Computer-Aided Drafting", credits: 3 },
                { name: "CE2080 - Mechanics of Materials", credits: 3 },
                { name: "EE2800 - Introduction to Electrical Engineering", credits: 3 },
                { name: "MI2050 - Product Innovation", credits: 3 },
                { name: "EM2020 - Probability and Statistics", credits: 2 },
                { name: "ME2020 - Mechanics of Machines", credits: 3 }
            ],
            "Civil Engineering": [
                { name: "EM2010 - Calculus II", credits: 2 },
                { name: "EM2020 - Probability and Statistics", credits: 2 },
                { name: "CE2010 - Structural Analysis I", credits: 2 },
                { name: "CE2020 - Fluid Mechanics I", credits: 3 },
                { name: "CE2040 - Soil Mechanics", credits: 3 },
                { name: "CE2050 - Land Surveying Techniques", credits: 1 },
                { name: "EE2810 - Essential Electrical Engineering", credits: 2 },
                { name: "ME2810 - Mechanical Engineering for civil", credits: 2 }
            ],
            "Chemical and Process Engineering": [
                { name: "CP2010 - Chemical Engineering Fundamentals", credits: 3 },
                { name: "CE2080 - Mechanics of Materials", credits: 3 },
                { name: "CE2020 - Fluid Mechanics I", credits: 3 },
                { name: "EE2800 - Introduction to Electrical Engineering", credits: 3 },
                { name: "CP2020 - Chemistry for Engineers", credits: 3 },
                { name: "EM2010 - Calculus II", credits: 2 },
                { name: "EM2020 - Probability and Statistics", credits: 2 }
            ]
        }
        // Add Sem 4, 5 etc here
    };

    let addedCourses = [];

    function updateDepartments() {
        const sem = document.getElementById('sem-select').value;
        const deptSelect = document.getElementById('dept-select');
        
        // 1. Reset Department dropdown
        deptSelect.innerHTML = '<option value="">-- Select --</option>';
        
        // 2. Reset Course dropdown and Credits input immediately
        document.getElementById('course-select').innerHTML = '<option value="">-- Select Dept First --</option>';
        document.getElementById('credit-input').value = '';

        if(universityData[sem]) {
            Object.keys(universityData[sem]).forEach(d => {
                let opt = document.createElement('option');
                opt.value = d; opt.textContent = d;
                deptSelect.appendChild(opt);
            });
        }
    }

    function updateCourses() {
        const sem = document.getElementById('sem-select').value;
        const dept = document.getElementById('dept-select').value;
        const courseSelect = document.getElementById('course-select');
        
        // 1. Reset Course dropdown
        courseSelect.innerHTML = '<option value="">-- Select --</option>';
        
        // 2. Reset Credits input
        document.getElementById('credit-input').value = '';

        if(sem && dept) {
            universityData[sem][dept].forEach((c, i) => {
                let opt = document.createElement('option');
                opt.value = i; opt.textContent = c.name;
                courseSelect.appendChild(opt);
            });
        }
    }

    function autoFillCredits() {
        const sem = document.getElementById('sem-select').value;
        const dept = document.getElementById('dept-select').value;
        const idx = document.getElementById('course-select').value;
        if(idx !== "") document.getElementById('credit-input').value = universityData[sem][dept][idx].credits;
    }

    function addCourse() {
        const sem = document.getElementById('sem-select').value;
        const dept = document.getElementById('dept-select').value;
        const idx = document.getElementById('course-select').value;
        const grade = parseFloat(document.getElementById('grade-select').value);
        if(idx === "") return;
        addedCourses.push({ ...universityData[sem][dept][idx], grade, sem });
        render();
    }

    function calculateGPA() {
        const pastGPA = parseFloat(document.getElementById('past-cgpa').value) || 0;
        const pastCredits = parseFloat(document.getElementById('past-credits').value) || 0;
    
        let totalPoints = pastGPA * pastCredits;
        let totalCredits = pastCredits;
        let currentSemPoints = 0;
        let currentSemCredits = 0;

        addedCourses.forEach(c => {
            const points = (c.credits * c.grade);
            totalPoints += points;
            totalCredits += c.credits;
            currentSemPoints += points;
            currentSemCredits += c.credits;
        });

        const finalCGPA = totalCredits > 0 ? (totalPoints / totalCredits).toFixed(2) : "0.00";
        const semGPA = currentSemCredits > 0 ? (currentSemPoints / currentSemCredits).toFixed(2) : "0.00";
    
        document.getElementById('gpa-result').innerText = finalCGPA;

        // Trigger the analytics
        generateSummary(parseFloat(finalCGPA), parseFloat(semGPA), pastGPA, currentSemCredits);
    }

    function generateSummary(cgpa, semGpa, pastCgpa, newCredits) {
        const summaryDiv = document.getElementById('analytics-summary');
    
        if (newCredits === 0) {
            summaryDiv.style.display = 'none';
            return;
        }

        summaryDiv.style.display = 'block';
        let trend = "";
        let color = "#1e293b"; // Default text color
        let bgColor = "#f1f5f9";

        // Logic for trend analysis
        if (semGpa > pastCgpa && pastCgpa > 0) {
            trend = "🚀 <strong>Academic Uptick:</strong> Your current semester performance is higher than your previous standing. This is improving your overall CGPA!";
            bgColor = "#f0fdf4"; // Green tint
        } else if (semGpa < pastCgpa && pastCgpa > 0) {
            trend = "📉 <strong>Performance Dip:</strong> Your current semester GPA is lower than your past CGPA. Focus on upcoming credits to maintain your standing.";
            bgColor = "#fef2f2"; // Red tint
        } else {
            trend = "📊 <strong>Steady Standing:</strong> You are maintaining a consistent academic performance.";
        }

        // Logic for Honours Classification (General University Standards)
        let classStatus = "";
        if (cgpa >= 3.70) classStatus = "First Class Honours";
        else if (cgpa >= 3.30) classStatus = "Second Class Upper";
        else if (cgpa >= 3.00) classStatus = "Second Class Lower";
        else classStatus = "General Pass";

        summaryDiv.style.backgroundColor = bgColor;
        summaryDiv.innerHTML = `
            <h4 style="margin-top:0; border-bottom: 1px solid #cbd5e1; padding-bottom:5px;">Performance Analytics</h4>
            <p>${trend}</p>
            <p><strong>Semester GPA:</strong> ${semGpa}</p>
            <p><strong>Predicted Standing:</strong> ${classStatus}</p>
        `;
    }

    function render() {
        const list = document.getElementById('course-list');
        list.innerHTML = '';
        addedCourses.forEach((c, i) => {
            list.innerHTML += `<div class="course-item">
                <span>[${c.sem}] ${c.name}</span>
                <span>GP: ${c.grade} <span class="delete-btn" onclick="remove(${i})">×</span></span>
            </div>`;
        });
        calculateGPA();
    }

    function remove(i) { addedCourses.splice(i, 1); render(); }
    function resetAll() { if(confirm("Clear?")) { addedCourses = []; document.getElementById('past-cgpa').value=''; document.getElementById('past-credits').value=''; render(); } }

    updateDepartments();
</script>
</body>
</html>
